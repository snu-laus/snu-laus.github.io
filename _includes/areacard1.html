<div class="post-card">
  {% if area.link.url %}
    <a href="{{ area.link.url }}" target="_blank" rel="noopener noreferrer">
  {% else %}
    <a href="#">
  {% endif %}

      {% if area.image %}
        <figure class="post-card__thumb">
          <img src="/assets/pubpic/{{ area.image }}" alt="{{ area.title }}">
        </figure>
      {% else %}
        <figure class="post-card__thumb"><div class="dark-bg"></div></figure>
      {% endif %}

  </a>
</div>
